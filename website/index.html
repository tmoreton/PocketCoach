<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mend.ly - Your AI Therapy Companion</title>
    <meta name="description" content="Mend.ly is a private AI therapy companion that helps you process your thoughts, build healthier habits, and feel heard — anytime, anywhere. No account required." />
    <meta name="theme-color" content="#6B9E8A" />
    <link rel="canonical" href="https://mendly.app" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mendly.app" />
    <meta property="og:title" content="Mend.ly - Therapy That Fits Your Life" />
    <meta property="og:description" content="Private AI companion for mental wellness. Process your thoughts, build healthier habits, and feel heard — anytime, anywhere. No account required." />
    <meta property="og:image" content="https://mendly.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Mend.ly" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mend.ly - Therapy That Fits Your Life" />
    <meta name="twitter:description" content="Private AI companion for mental wellness. No account required, no data stored, encrypted end-to-end." />
    <meta name="twitter:image" content="https://mendly.app/og-image.png" />

    <!-- Additional SEO -->
    <meta name="application-name" content="Mend.ly" />
    <meta name="apple-itunes-app" content="app-id=YOUR_APP_STORE_ID" />
    <meta name="keywords" content="AI therapy, mental health app, therapy companion, mental wellness, private therapy, AI counseling, mental health support, self-care app" />
    <meta name="robots" content="index, follow" />

    <!-- Web Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MobileApplication",
      "name": "Mend.ly",
      "description": "Private AI therapy companion that helps you process your thoughts, build healthier habits, and feel heard — anytime, anywhere.",
      "operatingSystem": "iOS 17.0+",
      "applicationCategory": "HealthApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "1"
      },
      "url": "https://mendly.app",
      "image": "https://mendly.app/og-image.png",
      "author": {
        "@type": "Organization",
        "name": "Mend.ly"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
