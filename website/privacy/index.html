  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import '../src/style.css'

      document.querySelector('#app').innerHTML = `
        <nav>
          <div class="nav-inner">
            <a href="/" class="logo-link">PocketCoach</a>
            <a href="#" class="nav-cta">Download</a>
          </div>
        </nav>

        <main class="subpage">
          <h1>Privacy Policy</h1>
          <p class="last-updated">Last updated: March 21, 2026</p>

          <h2>Our Commitment to Your Privacy</h2>
          <p>
            PocketCoach was built with a fundamental belief: your conversations are deeply personal.
            We are committed to being transparent about how your data is handled and giving you
            control over what is shared.
          </p>

          <h2>What Data We Collect</h2>
          <p>
            PocketCoach does not require an account, login, or any personal identifiers. The app
            collects the following data solely to provide its core features:
          </p>
          <ul>
            <li><strong>Audio recordings:</strong> Captured via your device's microphone when you start a coaching session.</li>
            <li><strong>Conversation transcripts:</strong> Generated from your audio recordings using on-device speech recognition.</li>
            <li><strong>Session analytics:</strong> Aggregated, non-identifying usage events (e.g., session started, session completed) collected via Firebase Analytics to help us improve the app.</li>
          </ul>
          <p>
            We do not collect personal identifiers, location data, health data, browsing history, or crash logs.
          </p>

          <h2>How Your Data Is Used</h2>
          <p>
            Your data is used exclusively to provide PocketCoach's coaching analysis features:
          </p>
          <ul>
            <li><strong>Conversation analysis:</strong> Transcripts are sent to OpenAI's API to generate coaching feedback, detect communication patterns, and provide actionable insights.</li>
            <li><strong>Speaker identification:</strong> Audio recordings may be sent to PyAnnote's API to identify which speaker said what (speaker diarization).</li>
            <li><strong>On-device transcription:</strong> Speech recognition is performed locally on your device using an on-device model.</li>
          </ul>

          <h2>Third-Party Services</h2>
          <p>
            PocketCoach shares data with the following third-party services to provide its features.
            Each service receives only the data necessary for its function:
          </p>
          <ul>
            <li>
              <strong>OpenAI</strong> — Receives conversation transcripts for coaching analysis and
              pattern detection. Data is transmitted via encrypted HTTPS connections. OpenAI's API
              data is not used to train their models.
              See <a href="https://openai.com/policies/privacy-policy" target="_blank" rel="noopener">OpenAI's Privacy Policy</a>.
            </li>
            <li>
              <strong>PyAnnote</strong> — Receives audio recordings for speaker diarization (identifying
              who said what). Data is transmitted via encrypted HTTPS connections.
              See <a href="https://www.pyannote.ai/privacy" target="_blank" rel="noopener">PyAnnote's Privacy Policy</a>.
            </li>
            <li>
              <strong>Firebase Analytics (Google)</strong> — Receives aggregated, non-identifying usage
              events. No personal data or conversation content is shared with Firebase.
              See <a href="https://firebase.google.com/support/privacy" target="_blank" rel="noopener">Firebase Privacy Information</a>.
            </li>
          </ul>
          <p>
            Your data is never sold, used for advertising, or shared with any parties beyond those listed above.
            Your conversation data is not used to train any AI models.
          </p>

          <h2>Your Consent</h2>
          <p>
            Before any data is sent to third-party AI services, PocketCoach asks for your explicit
            consent within the app. You must agree to the data sharing disclosure before conversation
            analysis features are activated. No data is transmitted to OpenAI or PyAnnote without
            your permission.
          </p>

          <h2>Data Storage</h2>
          <p>
            Conversation history and session data are stored locally on your device and, if enabled,
            synced to your private iCloud account via Apple's CloudKit. This data is protected by
            iOS's built-in security features and is only accessible to you. You can delete this
            data at any time within the app or by removing the app.
          </p>

          <h2>No Account Required</h2>
          <p>
            PocketCoach does not require you to create an account, sign in, or provide any personal
            information to use the app.
          </p>

          <h2>Children's Privacy</h2>
          <p>
            PocketCoach is not intended for use by children under 13. Since the app does not collect
            personal identifiers, we do not knowingly collect personal information from children.
          </p>

          <h2>Changes to This Policy</h2>
          <p>
            If we update this privacy policy, changes will be posted on this page with an
            updated revision date.
          </p>

          <h2>Contact</h2>
          <p>
            If you have questions about this privacy policy, please reach out via our
            <a href="/support">support page</a> or email
            <a href="mailto:support@getpocketcoach.app">support@getpocketcoach.app</a>.
          </p>
        </main>

        <footer>
          <div class="footer-inner">
            <div class="footer-links">
              <a href="/privacy">Privacy Policy</a>
              <a href="/support">Support</a>
            </div>
            <p>&copy; 2025 PocketCoach. All rights reserved.</p>
          </div>
        </footer>
      `
    </script>
  </body>
