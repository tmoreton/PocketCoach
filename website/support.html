  <body>
    <div id="app"></div>
    <script type="module">
      import './src/style.css'

      document.querySelector('#app').innerHTML = `
        <nav>
          <div class="nav-inner">
            <a href="/" class="logo-link">Mend.ly</a>
            <a href="#" class="nav-cta">Download</a>
          </div>
        </nav>

        <main class="subpage">
          <h1>Support</h1>
          <p class="last-updated">We're here to help</p>

          <h2>Frequently Asked Questions</h2>

          <h2>Is my data private?</h2>
          <p>
            Yes. Mend.ly requires no account and collects no personal information. Audio is
            processed on your device — only the text transcript is sent securely (encrypted)
            to generate AI responses. Transcripts are not stored on any server after processing.
            See our <a href="/privacy.html">Privacy Policy</a> for full details.
          </p>

          <h2>Do I need an internet connection?</h2>
          <p>
            An internet connection is needed for AI responses. However, audio recording and
            speech recognition work offline on your device.
          </p>

          <h2>What are the system requirements?</h2>
          <p>
            Mend.ly requires an iPhone running iOS 17.0 or later.
          </p>

          <h2>How do I delete my data?</h2>
          <p>
            Since all data is stored locally on your device, you can delete it by removing the
            Mend.ly app from your iPhone. You can also clear conversation history from within the
            app's settings. No data exists on any external server.
          </p>

          <h2>Is Mend.ly a replacement for professional therapy?</h2>
          <p>
            Mend.ly is designed as a supportive wellness companion, not a replacement for
            professional mental health care. If you are experiencing a mental health crisis,
            please contact a qualified mental health professional or call the
            <strong>988 Suicide &amp; Crisis Lifeline</strong> (call or text 988).
          </p>

          <h2>Contact Us</h2>
          <p>
            If you need further assistance, have feedback, or want to report an issue,
            please email us at:
          </p>
          <p>
            <a href="mailto:support@mendly.app">support@mendly.app</a>
          </p>
          <p>
            We typically respond within 48 hours.
          </p>
        </main>

        <footer>
          <div class="footer-inner">
            <div class="footer-links">
              <a href="/privacy.html">Privacy Policy</a>
              <a href="/support.html">Support</a>
            </div>
            <p>&copy; 2025 Mend.ly. All rights reserved.</p>
          </div>
        </footer>
      `
    </script>
