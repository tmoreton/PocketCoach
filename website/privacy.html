    <meta name="description" content="Mend.ly privacy policy. We collect no personal data, require no account, and use no tracking. Your conversations stay private and encrypted." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import './src/style.css'

      document.querySelector('#app').innerHTML = `
        <nav>
          <div class="nav-inner">
            <a href="/" class="logo-link">Mend.ly</a>
            <a href="#" class="nav-cta">Download</a>
          </div>
        </nav>

        <main class="subpage">
          <h1>Privacy Policy</h1>
          <p class="last-updated">Last updated: January 31, 2025</p>

          <h2>Our Commitment to Your Privacy</h2>
          <p>
            Mend.ly was built with a fundamental belief: your mental health conversations are deeply personal
            and should remain entirely yours. We designed Mend.ly from the ground up to ensure your privacy
            is never compromised.
          </p>

          <h2>No Personal Data Collection</h2>
          <p>
            Mend.ly does not collect or store any personal information. Specifically, we do not collect:
          </p>
          <ul>
            <li>Personal identifiers (name, email, phone number, or any account information)</li>
            <li>Usage or analytics data</li>
            <li>Device information or identifiers</li>
            <li>Location data</li>
            <li>Audio recordings or voice data</li>
            <li>Health or fitness data</li>
            <li>Browsing or search history</li>
            <li>Crash logs or diagnostics</li>
          </ul>

          <h2>How Your Conversations Are Processed</h2>
          <p>
            To provide helpful AI responses, conversation transcripts are sent securely to our
            AI service provider for processing. All data is transmitted using industry-standard
            encryption (TLS). Transcripts are not stored on any server after a response is
            generated, and are never used to train AI models or shared with third parties.
          </p>
          <p>
            Audio processing and speech recognition happen locally on your device. Only the
            resulting text transcript is transmitted — your voice recordings never leave your iPhone.
          </p>

          <h2>No Account Required</h2>
          <p>
            Mend.ly does not require you to create an account, sign in, or provide any personal
            information to use the app. There is no registration process, no email verification,
            and no user profiles.
          </p>

          <h2>No Tracking or Analytics</h2>
          <p>
            Mend.ly does not integrate with any third-party analytics, advertising, or tracking services.
            There are no SDKs, pixels, or external scripts collecting information about your usage.
          </p>

          <h2>Data Storage</h2>
          <p>
            Any data generated during your use of Mend.ly (such as conversation history) is stored
            locally on your device in your private application container. This data is protected by
            iOS's built-in security features and is only accessible to you. You can delete this
            data at any time by removing the app.
          </p>

          <h2>Children's Privacy</h2>
          <p>
            Since Mend.ly does not collect any personal information from any user, we inherently
            comply with children's privacy regulations including COPPA.
          </p>

          <h2>Changes to This Policy</h2>
          <p>
            If we ever update this privacy policy, changes will be posted on this page with an
            updated revision date.
          </p>

          <h2>Contact</h2>
          <p>
            If you have questions about this privacy policy, please reach out via our
            <a href="/support.html">support page</a>.
          </p>
        </main>

        <footer>
          <div class="footer-inner">
            <div class="footer-links">
              <a href="/privacy.html">Privacy Policy</a>
              <a href="/support.html">Support</a>
            </div>
            <p>&copy; 2025 Mend.ly. All rights reserved.</p>
          </div>
        </footer>
      `
    </script>
  </body>
</html>
